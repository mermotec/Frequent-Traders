<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1a0e2e"/>
      <stop offset="100%" stop-color="#0a0612"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9900" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff9900" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="blur3">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#cc7700"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="1200" height="400" rx="28" ry="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="1200" height="400" fill="url(#bg)"/>

    <!-- Ambient glow center -->
    <ellipse cx="600" cy="200" rx="500" ry="220" fill="url(#glow)">
      <animate attributeName="rx" values="480;540;480" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="200;240;200" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="4s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Stars -->
    <circle cx="120" cy="60" r="1.5" fill="#fff" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="35" r="1" fill="#fff" opacity="0.5"><animate attributeName="opacity" values="0.5;0.05;0.5" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="50" r="1.5" fill="#fff" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="750" cy="30" r="1" fill="#fff" opacity="0.4"><animate attributeName="opacity" values="0.4;0.05;0.4" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="950" cy="55" r="1.5" fill="#fff" opacity="0.6"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="40" r="1" fill="#fff" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="80" cy="340" r="1.2" fill="#fff" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="360" r="1" fill="#fff" opacity="0.5"><animate attributeName="opacity" values="0.5;0.05;0.5" dur="3.5s" repeatCount="indefinite"/></circle>

    <!-- Wandering Trader (pixel art style) -->
    <!-- Body (blue robe) -->
    <rect x="565" y="190" width="70" height="90" rx="4" fill="#2255cc"/>
    <!-- Robe highlight -->
    <rect x="573" y="195" width="20" height="80" rx="3" fill="#3366ee" opacity="0.5"/>
    <!-- Head -->
    <rect x="572" y="148" width="56" height="50" rx="5" fill="#e8c49a"/>
    <!-- Eyes -->
    <rect x="582" y="163" width="10" height="10" rx="2" fill="#1a1a1a"/>
    <rect x="608" y="163" width="10" height="10" rx="2" fill="#1a1a1a"/>
    <!-- Eye glow -->
    <rect x="584" y="165" width="4" height="4" rx="1" fill="#fff" opacity="0.7"/>
    <rect x="610" y="165" width="4" height="4" rx="1" fill="#fff" opacity="0.7"/>
    <!-- Beard -->
    <rect x="578" y="183" width="44" height="14" rx="5" fill="#d4c4a0"/>
    <!-- Hat -->
    <rect x="567" y="130" width="66" height="22" rx="4" fill="#1a44aa"/>
    <rect x="557" y="147" width="86" height="8" rx="3" fill="#1a44aa"/>
    <!-- Arms -->
    <rect x="538" y="195" width="26" height="60" rx="5" fill="#2255cc"/>
    <rect x="636" y="195" width="26" height="60" rx="5" fill="#2255cc"/>
    <!-- Hands -->
    <rect x="541" y="252" width="20" height="18" rx="4" fill="#e8c49a"/>
    <rect x="639" y="252" width="20" height="18" rx="4" fill="#e8c49a"/>
    <!-- Legs -->
    <rect x="571" y="278" width="25" height="38" rx="4" fill="#7b5c3a"/>
    <rect x="604" y="278" width="25" height="38" rx="4" fill="#7b5c3a"/>
    <!-- Boots -->
    <rect x="569" y="310" width="27" height="14" rx="3" fill="#4a3822"/>
    <rect x="602" y="310" width="27" height="14" rx="3" fill="#4a3822"/>
    <!-- Staff in right hand -->
    <rect x="656" y="170" width="7" height="110" rx="3" fill="#8B6914"/>
    <circle cx="659" cy="165" r="10" fill="#ffcc00" filter="url(#blur3)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="659" cy="165" r="6" fill="#ffee88">
      <animate attributeName="r" values="5;7;5" dur="1.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Floating coins -->
    <!-- Coin 1 -->
    <ellipse cx="460" cy="200" rx="18" ry="14" fill="#ffcc00" filter="url(#blur3)">
      <animate attributeName="cy" values="200;188;200" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.6;0.9" dur="2.2s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="460" cy="200" rx="13" ry="10" fill="#ffe566">
      <animate attributeName="cy" values="200;188;200" dur="2.2s" repeatCount="indefinite"/>
    </ellipse>
    <text x="455" y="204" font-size="12" fill="#aa7700" font-weight="bold">
      <animate attributeName="y" values="204;192;204" dur="2.2s" repeatCount="indefinite"/>$</text>
    <!-- Coin 2 -->
    <ellipse cx="420" cy="250" rx="14" ry="11" fill="#ffcc00" filter="url(#blur3)">
      <animate attributeName="cy" values="250;240;250" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.5;0.8" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="420" cy="250" rx="10" ry="8" fill="#ffe566">
      <animate attributeName="cy" values="250;240;250" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Coin 3 -->
    <ellipse cx="755" cy="215" rx="16" ry="12" fill="#ffcc00" filter="url(#blur3)">
      <animate attributeName="cy" values="215;203;215" dur="2.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.55;0.9" dur="2.7s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="755" cy="215" rx="11" ry="9" fill="#ffe566">
      <animate attributeName="cy" values="215;203;215" dur="2.7s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Coin 4 -->
    <ellipse cx="790" cy="260" rx="12" ry="9" fill="#ffcc00" filter="url(#blur3)">
      <animate attributeName="cy" values="260;250;260" dur="1.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.4;0.7" dur="1.9s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Particle sparkles -->
    <circle cx="500" cy="160" r="3" fill="#ffe066" opacity="0.8">
      <animate attributeName="cy" values="160;140;160" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="145" r="2.5" fill="#ffe066" opacity="0.7">
      <animate attributeName="cy" values="145;125;145" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="540" cy="310" r="2" fill="#66aaff" opacity="0.6">
      <animate attributeName="cy" values="310;295;310" dur="3.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="660" cy="295" r="2" fill="#aaddff" opacity="0.5">
      <animate attributeName="cy" values="295;278;295" dur="2.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2.3s" repeatCount="indefinite"/>
    </circle>

    <!-- Title text -->
    <text x="600" y="98" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="64" font-weight="900" fill="url(#goldText)" filter="url(#blur3)">FREQUENT TRADERS</text>
    <text x="600" y="98" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="64" font-weight="900" fill="url(#goldText)">
      <animate attributeName="opacity" values="1;0.85;1" dur="3s" repeatCount="indefinite"/>FREQUENT TRADERS</text>

    <!-- Subtitle -->
    <text x="600" y="135" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#aaccff" opacity="0.85">More Wandering Traders. Less waiting.</text>

    <!-- Bottom bar -->
    <rect x="0" y="370" width="1200" height="30" fill="#000" opacity="0.45"/>
    <text x="600" y="390" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="15" fill="#aaaacc" opacity="0.9">by MermoTEC · CurseForge · Minecraft Mod</text>

    <!-- Shine sweep -->
    <rect x="-800" y="0" width="500" height="400" fill="url(#shine)">
      <animate attributeName="x" from="-800" to="1400" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- Border -->
    <rect x="1" y="1" width="1198" height="398" rx="27" ry="27" fill="none" stroke="#ffcc00" stroke-width="1.5" stroke-opacity="0.25"/>
  </g>
</svg>